<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تسجيل وإنشاء حساب - لودو</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <style>
        /* تنسيقات إضافية للصفحة */
        .auth-tabs {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin-bottom: 25px;
        }
        .auth-tab {
            background: #1e2740;
            padding: 12px 30px;
            border-radius: 50px;
            cursor: pointer;
            font-weight: 700;
            border: 2px solid transparent;
            transition: 0.2s;
        }
        .auth-tab.active {
            border-color: gold;
            background: #2a3450;
        }
        .auth-panel {
            background: rgba(0,0,0,0.3);
            border-radius: 40px;
            padding: 25px;
            margin-bottom: 20px;
        }
        .input-field {
            width: 100%;
            padding: 15px;
            margin: 10px 0;
            border-radius: 50px;
            border: none;
            background: #1e2740;
            color: white;
            font-size: 1rem;
            text-align: right;
        }
        .auth-btn {
            width: 100%;
            background: gold;
            color: black;
            border: none;
            padding: 15px;
            border-radius: 50px;
            font-weight: bold;
            font-size: 1.1rem;
            margin: 10px 0;
            cursor: pointer;
        }
        .social-buttons {
            display: flex;
            flex-direction: column;
            gap: 10px;
            margin-top: 20px;
        }
        .social-btn {
            padding: 14px;
            border-radius: 50px;
            border: none;
            font-weight: 600;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            cursor: pointer;
        }
        .social-btn.google { background: #DB4437; color: white; }
        .social-btn.facebook { background: #4267B2; color: white; }
        .social-btn.twitter { background: #1DA1F2; color: white; }
        .phone-input {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }
        .otp-container {
            margin-top: 15px;
        }
        .otp-input {
            display: flex;
            gap: 8px;
            justify-content: center;
            direction: ltr;
        }
        .otp-input input {
            width: 45px;
            height: 55px;
            text-align: center;
            font-size: 1.3rem;
            border-radius: 12px;
            border: none;
            background: #1e2740;
            color: white;
        }
        .hidden { display: none; }
        .error-box {
            background: #4a1e2b;
            border: 2px solid #ff6b6b;
            border-radius: 30px;
            padding: 10px;
            margin: 10px 0;
            color: #ffaaaa;
            text-align: center;
        }
        .guest-link {
            margin-top: 15px;
            color: #aaa;
            text-align: center;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <div class="app login-container">
        <div class="login-logo">LUDO</div>

        <!-- تبويبات (تسجيل دخول / إنشاء حساب) -->
        <div class="auth-tabs">
            <div class="auth-tab active" data-tab="login">تسجيل دخول</div>
            <div class="auth-tab" data-tab="signup">إنشاء حساب</div>
        </div>

        <!-- لوحة تسجيل الدخول -->
        <div id="loginPanel" class="auth-panel">
            <h3 style="color:gold; text-align:center;">تسجيل الدخول</h3>
            <input type="email" id="loginEmail" class="input-field" placeholder="البريد الإلكتروني">
            <input type="password" id="loginPassword" class="input-field" placeholder="كلمة المرور">
            <button class="auth-btn" id="loginBtn">تسجيل الدخول</button>
            <div style="text-align:center; margin:15px 0; color:#aaa;">أو</div>
            <button class="social-btn google" id="googleLogin"><i class="fab fa-google"></i> Google</button>
            <button class="social-btn facebook" id="facebookLogin"><i class="fab fa-facebook-f"></i> Facebook</button>
            <button class="social-btn twitter" id="twitterLogin"><i class="fab fa-x-twitter"></i> Twitter</button>
            <div style="margin:15px 0;"></div>
            <div class="phone-input">
                <input type="text" id="phoneNumber" class="input-field" placeholder="رقم الهاتف (مثال: +964...)">
                <button class="auth-btn" id="sendOtpBtn">إرسال رمز التحقق</button>
            </div>
            <div id="otpSection" class="hidden otp-container">
                <div class="otp-input" id="otpInputs">
                    <input type="text" maxlength="1" class="otp-digit">
                    <input type="text" maxlength="1" class="otp-digit">
                    <input type="text" maxlength="1" class="otp-digit">
                    <input type="text" maxlength="1" class="otp-digit">
                    <input type="text" maxlength="1" class="otp-digit">
                    <input type="text" maxlength="1" class="otp-digit">
                </div>
                <button class="auth-btn" id="verifyOtpBtn">تأكيد الرمز</button>
            </div>
        </div>

        <!-- لوحة إنشاء حساب -->
        <div id="signupPanel" class="auth-panel hidden">
            <h3 style="color:gold; text-align:center;">إنشاء حساب جديد</h3>
            <input type="text" id="signupName" class="input-field" placeholder="الاسم">
            <input type="email" id="signupEmail" class="input-field" placeholder="البريد الإلكتروني">
            <input type="password" id="signupPassword" class="input-field" placeholder="كلمة المرور">
            <input type="password" id="signupConfirm" class="input-field" placeholder="تأكيد كلمة المرور">
            <button class="auth-btn" id="signupBtn">إنشاء حساب</button>
            <p style="color:#aaa; font-size:0.9rem; margin-top:10px;">بإنشاء حساب، ستتم إضافة معرف فريد لحسابك تلقائياً.</p>
        </div>

        <!-- رسائل الخطأ -->
        <div id="errorMessage" class="error-box hidden">
            <i class="fas fa-exclamation-triangle"></i>
            <span id="errorText"></span>
        </div>

        <!-- دخول كضيف (للتجربة) -->
        <div class="guest-link" onclick="guestLogin()">
            <i class="fas fa-user-secret"></i> متابعة كضيف (بدون حفظ)
        </div>
    </div>

    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>
    <script src="firebase-config.js"></script>
    <script src="script.js"></script>
    <script>
        // التبديل بين تسجيل الدخول وإنشاء حساب
        document.querySelectorAll('.auth-tab').forEach(tab => {
            tab.addEventListener('click', function() {
                document.querySelectorAll('.auth-tab').forEach(t => t.classList.remove('active'));
                this.classList.add('active');
                const isLogin = this.dataset.tab === 'login';
                document.getElementById('loginPanel').classList.toggle('hidden', !isLogin);
                document.getElementById('signupPanel').classList.toggle('hidden', isLogin);
                document.getElementById('errorMessage').classList.add('hidden');
            });
        });

        // دالة عرض الخطأ
        function showError(message) {
            document.getElementById('errorText').innerText = message;
            document.getElementById('errorMessage').classList.remove('hidden');
        }

        // تسجيل الدخول بالبريد الإلكتروني
        document.getElementById('loginBtn').addEventListener('click', () => {
            const email = document.getElementById('loginEmail').value;
            const password = document.getElementById('loginPassword').value;
            auth.signInWithEmailAndPassword(email, password)
                .then(() => window.location.href = 'index.html')
                .catch(err => showError(err.message));
        });

        // إنشاء حساب جديد
        document.getElementById('signupBtn').addEventListener('click', async () => {
            const name = document.getElementById('signupName').value;
            const email = document.getElementById('signupEmail').value;
            const password = document.getElementById('signupPassword').value;
            const confirm = document.getElementById('signupConfirm').value;

            if (!name || !email || !password) return showError('جميع الحقول مطلوبة');
            if (password !== confirm) return showError('كلمة المرور غير متطابقة');

            try {
                const userCred = await auth.createUserWithEmailAndPassword(email, password);
                // تحديث الاسم
                await userCred.user.updateProfile({ displayName: name });
                // إنشاء ID فريد للمستخدم وحفظه
                await createUserProfile(userCred.user);
                window.location.href = 'index.html';
            } catch (err) {
                showError(err.message);
            }
        });

        // Google
        document.getElementById('googleLogin').addEventListener('click', () => {
            auth.signInWithPopup(googleProvider)
                .then(async result => {
                    // إذا كان مستخدم جديد، أنشئ له بروفايل
                    if (result.additionalUserInfo.isNewUser) {
                        await createUserProfile(result.user);
                    }
                    window.location.href = 'index.html';
                })
                .catch(err => showError(err.message));
        });

        // Facebook
        document.getElementById('facebookLogin').addEventListener('click', () => {
            auth.signInWithPopup(facebookProvider)
                .then(async result => {
                    if (result.additionalUserInfo.isNewUser) {
                        await createUserProfile(result.user);
                    }
                    window.location.href = 'index.html';
                })
                .catch(err => showError(err.message));
        });

        // Twitter
        document.getElementById('twitterLogin').addEventListener('click', () => {
            auth.signInWithPopup(twitterProvider)
                .then(async result => {
                    if (result.additionalUserInfo.isNewUser) {
                        await createUserProfile(result.user);
                    }
                    window.location.href = 'index.html';
                })
                .catch(err => showError(err.message));
        });

        // ------------------ الهاتف ------------------
        let confirmationResult = null;
        document.getElementById('sendOtpBtn').addEventListener('click', () => {
            const phone = document.getElementById('phoneNumber').value.trim();
            if (!phone) return showError('أدخل رقم الهاتف');
            const formatted = phone.startsWith('+') ? phone : '+' + phone;
            auth.signInWithPhoneNumber(formatted, window.recaptchaVerifier)
                .then(result => {
                    confirmationResult = result;
                    document.getElementById('otpSection').classList.remove('hidden');
                })
                .catch(err => showError(err.message));
        });

        document.getElementById('verifyOtpBtn').addEventListener('click', () => {
            const digits = document.querySelectorAll('.otp-digit');
            let otp = '';
            digits.forEach(d => otp += d.value);
            if (otp.length !== 6) return showError('أدخل الرمز المكون من 6 أرقام');
            confirmationResult.confirm(otp)
                .then(async result => {
                    if (result.additionalUserInfo && result.additionalUserInfo.isNewUser) {
                        await createUserProfile(result.user);
                    }
                    window.location.href = 'index.html';
                })
                .catch(err => showError('رمز غير صحيح'));
        });

        // التنقل بين خانات OTP
        document.querySelectorAll('.otp-digit').forEach((input, index, inputs) => {
            input.addEventListener('input', function() {
                if (this.value.length === 1 && index < inputs.length - 1) {
                    inputs[index + 1].focus();
                }
            });
        });

        // reCAPTCHA
        window.recaptchaVerifier = new firebase.auth.RecaptchaVerifier('sendOtpBtn', {
            size: 'invisible',
            callback: () => {}
        });

        // دوال مساعدة من script.js
        async function createUserProfile(user) {
            // سيتم تعريفها في script.js
        }
    </script>
</body>
</html>
