<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>طاولة خاصة - Clipn</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Cairo', sans-serif;
        }
        body {
            background: linear-gradient(145deg, #0a0f1f 0%, #141b2b 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 16px;
            color: #fff;
        }
        .app {
            max-width: 400px;
            width: 100%;
            background: rgba(18, 25, 40, 0.9);
            backdrop-filter: blur(12px);
            border-radius: 48px;
            padding: 30px 20px 30px;
            box-shadow: 0 25px 50px -8px rgba(0,0,0,0.6), 0 0 0 2px rgba(255,215,0,0.15) inset;
            border: 1px solid rgba(255,215,0,0.3);
        }

        .header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 20px;
        }
        .back-btn {
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,215,0,0.3);
            color: gold;
            width: 44px;
            height: 44px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.4rem;
            cursor: pointer;
        }
        .title {
            font-size: 1.5rem;
            font-weight: 800;
            color: gold;
            text-align: center;
            line-height: 1.2;
        }
        .subtitle {
            font-size: 0.9rem;
            color: #ffd966;
            text-align: center;
        }

        .section-title {
            font-size: 1.2rem;
            font-weight: 700;
            color: #ffd966;
            margin: 20px 0 12px;
            text-align: center;
        }

        .mode-row {
            display: flex;
            justify-content: center;
            gap: 12px;
            margin-bottom: 10px;
        }
        .mode-btn {
            background: rgba(0,0,0,0.4);
            border: 2px solid #ffd96655;
            border-radius: 40px;
            padding: 10px 20px;
            font-weight: 600;
            color: white;
            cursor: pointer;
            transition: 0.1s;
            flex: 1;
            text-align: center;
            max-width: 110px;
        }
        .mode-btn.active {
            background: rgba(255,215,0,0.2);
            border-color: gold;
            color: gold;
        }

        .player-count-options {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-bottom: 25px;
        }
        .count-option {
            background: rgba(0,0,0,0.4);
            border: 2px solid #ffd96655;
            border-radius: 50px;
            padding: 8px 15px;
            display: flex;
            flex-direction: column;
            align-items: center;
            cursor: pointer;
            min-width: 70px;
        }
        .count-option.active {
            background: rgba(255,215,0,0.2);
            border-color: gold;
        }
        .count-number {
            font-size: 1.8rem;
            font-weight: 800;
            color: gold;
            line-height: 1;
        }
        .count-label {
            font-size: 0.75rem;
            color: #aaa;
        }

        .players-names {
            background: rgba(0,0,0,0.3);
            border-radius: 30px;
            padding: 20px;
            margin-bottom: 25px;
            border: 1px solid #ffd96633;
        }
        .players-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 15px;
        }
        .player-input {
            background: rgba(255,255,255,0.05);
            border: 1px solid #ffd96655;
            border-radius: 30px;
            padding: 10px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .player-input label {
            font-size: 0.8rem;
            color: gold;
            margin-bottom: 5px;
        }
        .player-input input {
            background: transparent;
            border: none;
            text-align: center;
            color: white;
            font-weight: 600;
            width: 100%;
            outline: none;
        }

        .action-buttons {
            display: flex;
            gap: 15px;
            margin-top: 10px;
        }
        .primary-btn {
            background: gold;
            color: black;
            border: none;
            flex: 2;
            padding: 16px;
            border-radius: 60px;
            font-size: 1.5rem;
            font-weight: 800;
            cursor: pointer;
            box-shadow: 0 8px 0 #b8860b;
            transition: 0.1s;
        }
        .primary-btn:active {
            transform: translateY(4px);
            box-shadow: 0 4px 0 #b8860b;
        }
        .secondary-btn {
            background: rgba(255,255,255,0.05);
            border: 2px solid gold;
            color: gold;
            flex: 1;
            padding: 16px;
            border-radius: 60px;
            font-size: 1.2rem;
            font-weight: 700;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <div class="app">
        <div class="header">
            <div class="back-btn" onclick="window.location.href='index.html'"><i class="fas fa-arrow-right"></i></div>
            <div>
                <div class="title">طاولة خاصة</div>
                <div class="subtitle">بدون الإنترنت</div>
            </div>
            <div style="width:44px;"></div>
        </div>

        <div class="section-title">حدد النمط</div>
        <div class="mode-row">
            <div class="mode-btn active" data-mode="كلاسيكي">الخامسيك</div>
            <div class="mode-btn" data-mode="ماستر">الماسير</div>
            <div class="mode-btn" data-mode="سريع">السريع</div>
        </div>

        <div class="section-title">اختيار العدد</div>
        <div class="player-count-options">
            <div class="count-option active" data-count="4">
                <span class="count-number">4</span>
                <span class="count-label">لاعبين</span>
            </div>
            <div class="count-option" data-count="3">
                <span class="count-number">3</span>
                <span class="count-label">لاعبين</span>
            </div>
            <div class="count-option" data-count="2">
                <span class="count-number">2</span>
                <span class="count-label">لاعبين</span>
            </div>
        </div>

        <div class="players-names">
            <div class="players-grid" id="playersGrid"></div>
        </div>

        <div class="action-buttons">
            <button class="secondary-btn" onclick="window.location.href='index.html'">التسجيل</button>
            <button class="primary-btn" onclick="startGame()">ابدأ</button>
        </div>
    </div>

    <script>
        let currentMode = 'كلاسيكي';
        let currentCount = 4;

        function renderPlayers(count) {
            const grid = document.getElementById('playersGrid');
            grid.innerHTML = '';
            for (let i = 1; i <= count; i++) {
                const div = document.createElement('div');
                div.className = 'player-input';
                div.innerHTML = `
                    <label>ألعاب ${i}</label>
                    <input type="text" placeholder="اسم اللاعب ${i}" value="لاعب ${i}">
                `;
                grid.appendChild(div);
            }
        }

        // أحداث اختيار النمط
        document.querySelectorAll('.mode-btn').forEach(btn => {
            btn.addEventListener('click', function() {
                document.querySelectorAll('.mode-btn').forEach(b => b.classList.remove('active'));
                this.classList.add('active');
                currentMode = this.dataset.mode;
            });
        });

        // أحداث اختيار عدد اللاعبين
        document.querySelectorAll('.count-option').forEach(opt => {
            opt.addEventListener('click', function() {
                document.querySelectorAll('.count-option').forEach(o => o.classList.remove('active'));
                this.classList.add('active');
                currentCount = parseInt(this.dataset.count);
                renderPlayers(currentCount);
            });
        });

        // بدء اللعبة
        function startGame() {
            const players = [];
            document.querySelectorAll('.player-input input').forEach(input => {
                players.push(input.value || 'لاعب');
            });
            // تخزين المعلومات في localStorage للوصول إليها في الصفحة الجديدة
            localStorage.setItem('localGameMode', currentMode);
            localStorage.setItem('localGamePlayers', JSON.stringify(players));
            localStorage.setItem('localGameCount', currentCount);
            // التوجيه إلى صفحة اللعبة المحلية
            window.location.href = 'local-game.html';
        }

        // التحميل الأولي
        renderPlayers(4);
    </script>
</body>
</html>
