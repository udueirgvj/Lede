<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>طاولة خاصة - Clipn</title>
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <!-- خط Cairo -->
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Cairo', sans-serif;
        }
        body {
            background: linear-gradient(145deg, #0a0f1f 0%, #141b2b 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 16px;
            color: #fff;
        }
        .app {
            max-width: 400px;
            width: 100%;
            background: rgba(18, 25, 40, 0.9);
            backdrop-filter: blur(12px);
            border-radius: 48px;
            padding: 30px 20px 30px;
            box-shadow: 0 25px 50px -8px rgba(0,0,0,0.6), 0 0 0 2px rgba(255,215,0,0.15) inset;
            border: 1px solid rgba(255,215,0,0.3);
        }

        /* رأس الصفحة */
        .header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 20px;
        }
        .back-btn {
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,215,0,0.3);
            color: gold;
            width: 44px;
            height: 44px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.4rem;
            cursor: pointer;
            transition: 0.2s;
        }
        .back-btn:hover {
            background: rgba(255,215,0,0.2);
        }
        .title {
            font-size: 1.5rem;
            font-weight: 800;
            color: gold;
            text-align: center;
        }
        .subtitle {
            font-size: 1rem;
            color: #ffd966;
            text-align: center;
            margin-top: -5px;
        }

        /* بطاقة بدون إنترنت */
        .offline-badge {
            background: rgba(255,0,0,0.1);
            border: 1px solid #ff6666;
            border-radius: 40px;
            padding: 8px 16px;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            color: #ff8888;
            margin-bottom: 20px;
        }

        /* حدد النمط */
        .section-title {
            font-size: 1.2rem;
            font-weight: 700;
            color: #ffd966;
            margin-bottom: 12px;
            text-align: center;
        }
        .mode-row {
            display: flex;
            justify-content: center;
            gap: 12px;
            margin-bottom: 25px;
        }
        .mode-btn {
            background: rgba(0,0,0,0.4);
            border: 2px solid #ffd96655;
            border-radius: 40px;
            padding: 10px 25px;
            font-weight: 600;
            color: white;
            cursor: pointer;
            transition: 0.1s;
            flex: 1;
            text-align: center;
            max-width: 100px;
        }
        .mode-btn.active {
            background: rgba(255,215,0,0.2);
            border-color: gold;
            color: gold;
        }

        /* اختيار عدد اللاعبين */
        .player-count-options {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-bottom: 25px;
        }
        .count-option {
            background: rgba(0,0,0,0.4);
            border: 2px solid #ffd96655;
            border-radius: 50px;
            padding: 10px 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            cursor: pointer;
            min-width: 70px;
        }
        .count-option.active {
            background: rgba(255,215,0,0.2);
            border-color: gold;
        }
        .count-number {
            font-size: 2rem;
            font-weight: 800;
            color: gold;
            line-height: 1;
        }
        .count-label {
            font-size: 0.8rem;
            color: #aaa;
        }

        /* أسماء اللاعبين */
        .players-names {
            background: rgba(0,0,0,0.3);
            border-radius: 40px;
            padding: 20px;
            margin-bottom: 25px;
            border: 1px solid #ffd96633;
        }
        .players-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 15px;
        }
        .player-input {
            background: rgba(255,255,255,0.05);
            border: 1px solid #ffd96655;
            border-radius: 30px;
            padding: 12px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .player-input label {
            font-size: 0.8rem;
            color: gold;
            margin-bottom: 5px;
        }
        .player-input input {
            background: transparent;
            border: none;
            text-align: center;
            color: white;
            font-weight: 600;
            width: 100%;
            outline: none;
        }
        .player-input input::placeholder {
            color: #666;
        }

        /* الأزرار السفلية */
        .action-buttons {
            display: flex;
            gap: 15px;
            margin-top: 10px;
        }
        .primary-btn {
            background: gold;
            color: black;
            border: none;
            flex: 2;
            padding: 16px;
            border-radius: 60px;
            font-size: 1.5rem;
            font-weight: 800;
            cursor: pointer;
            box-shadow: 0 8px 0 #b8860b;
            transition: 0.1s;
        }
        .primary-btn:active {
            transform: translateY(4px);
            box-shadow: 0 4px 0 #b8860b;
        }
        .secondary-btn {
            background: rgba(255,255,255,0.05);
            border: 2px solid gold;
            color: gold;
            flex: 1;
            padding: 16px;
            border-radius: 60px;
            font-size: 1.2rem;
            font-weight: 700;
            cursor: pointer;
            transition: 0.1s;
        }
        .secondary-btn:active {
            background: rgba(255,215,0,0.2);
        }
    </style>
</head>
<body>
    <div class="app">
        <!-- رأس الصفحة -->
        <div class="header">
            <div class="back-btn" onclick="window.location.href='index.html'">
                <i class="fas fa-arrow-right"></i>
            </div>
            <div>
                <div class="title">طاولة خاصة</div>
                <div class="subtitle">بدون الإنترنت</div>
            </div>
            <div style="width:44px;"></div> <!-- فراغ للمحاذاة -->
        </div>

        <!-- حدد النمط -->
        <div class="section-title">حدد النمط</div>
        <div class="mode-row">
            <div class="mode-btn" onclick="selectMode(this)" data-mode="سريع">السريع</div>
            <div class="mode-btn" onclick="selectMode(this)" data-mode="ماستر">الماستر</div>
            <div class="mode-btn active" onclick="selectMode(this)" data-mode="كلاسيكي">الكلامسيكي</div>
        </div>

        <!-- اختيار عدد اللاعبين -->
        <div class="section-title">اختيار العدد</div>
        <div class="player-count-options">
            <div class="count-option active" onclick="selectPlayerCount(2, this)">
                <span class="count-number">2</span>
                <span class="count-label">لاعبين</span>
            </div>
            <div class="count-option" onclick="selectPlayerCount(3, this)">
                <span class="count-number">3</span>
                <span class="count-label">لاعبين</span>
            </div>
            <div class="count-option" onclick="selectPlayerCount(4, this)">
                <span class="count-number">4</span>
                <span class="count-label">لاعبين</span>
            </div>
        </div>

        <!-- أسماء اللاعبين -->
        <div class="players-names">
            <div class="players-grid" id="playersGrid">
                <!-- سيتم تعبئتها بواسطة JavaScript -->
            </div>
        </div>

        <!-- أزرار الإجراء -->
        <div class="action-buttons">
            <button class="secondary-btn" onclick="window.location.href='index.html'">التسجيل</button>
            <button class="primary-btn" onclick="startLocalGame()">ابدأ</button>
        </div>
    </div>

    <script>
        let currentMode = 'كلاسيكي';
        let playerCount = 2; // افتراضي

        // تهيئة أسماء اللاعبين
        function renderPlayers(count) {
            const grid = document.getElementById('playersGrid');
            grid.innerHTML = '';
            for (let i = 1; i <= count; i++) {
                const div = document.createElement('div');
                div.className = 'player-input';
                div.innerHTML = `
                    <label>اللاعب ${i}</label>
                    <input type="text" placeholder="اسم اللاعب ${i}" value="لاعب ${i}">
                `;
                grid.appendChild(div);
            }
        }

        // تغيير عدد اللاعبين
        window.selectPlayerCount = function(count, element) {
            playerCount = count;
            document.querySelectorAll('.count-option').forEach(opt => opt.classList.remove('active'));
            element.classList.add('active');
            renderPlayers(count);
        };

        // اختيار النمط
        window.selectMode = function(element) {
            document.querySelectorAll('.mode-btn').forEach(btn => btn.classList.remove('active'));
            element.classList.add('active');
            currentMode = element.dataset.mode;
        };

        // بدء اللعبة المحلية
        window.startLocalGame = function() {
            // جمع أسماء اللاعبين
            const inputs = document.querySelectorAll('.player-input input');
            const players = [];
            inputs.forEach(input => players.push(input.value || 'لاعب'));

            // هنا يمكن تخزين الإعدادات في localStorage أو التوجيه إلى صفحة اللعبة
            alert(`بدء لعبة محلية بـ ${playerCount} لاعبين، النمط: ${currentMode}\nاللاعبون: ${players.join('، ')}`);
            
            // التوجيه إلى صفحة اللعبة (يمكنك تغيير الرابط)
            // window.location.href = `local-game.html?mode=${currentMode}&players=${playerCount}`;
        };

        // التحميل الأولي
        renderPlayers(2);
    </script>
</body>
</html>
