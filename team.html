<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>اختيار النمط - Clipn</title>
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <!-- خط Cairo -->
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;800&display=swap" rel="stylesheet">
    <!-- استيراد التنسيقات العامة (يمكنك دمجها في ملف واحد) -->
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Cairo', sans-serif;
        }
        body {
            background: linear-gradient(145deg, #0a0f1f 0%, #141b2b 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 16px;
            color: #fff;
        }
        .app {
            max-width: 400px;
            width: 100%;
            background: rgba(18, 25, 40, 0.9);
            backdrop-filter: blur(12px);
            border-radius: 48px;
            padding: 30px 20px 30px;
            box-shadow: 0 25px 50px -8px rgba(0,0,0,0.6), 0 0 0 2px rgba(255,215,0,0.15) inset;
            border: 1px solid rgba(255,215,0,0.3);
        }

        /* رأس الصفحة مع زر الرجوع */
        .header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 25px;
        }
        .back-btn {
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,215,0,0.3);
            color: gold;
            width: 44px;
            height: 44px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.4rem;
            cursor: pointer;
            transition: 0.2s;
        }
        .back-btn:hover {
            background: rgba(255,215,0,0.2);
            color: #ffd966;
        }
        .title {
            font-size: 1.6rem;
            font-weight: 800;
            color: gold;
            text-shadow: 0 0 10px #ffbf00;
        }
        .points-badge {
            background: rgba(255,215,0,0.15);
            backdrop-filter: blur(4px);
            padding: 8px 16px;
            border-radius: 30px;
            display: flex;
            align-items: center;
            gap: 8px;
            border: 1px solid rgba(255,215,0,0.5);
            font-weight: 600;
            color: #ffd966;
        }
        .points-badge i {
            color: gold;
        }

        /* عدد اللاعبين وخيار 1 مقابل 1 */
        .players-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: rgba(0,0,0,0.3);
            border-radius: 60px;
            padding: 10px 20px;
            margin-bottom: 25px;
            border: 1px solid #ffd96633;
        }
        .player-count {
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 1.2rem;
            font-weight: 700;
        }
        .player-count i {
            color: gold;
            font-size: 1.8rem;
        }
        .vs-option {
            background: rgba(255,215,0,0.2);
            padding: 8px 20px;
            border-radius: 40px;
            color: gold;
            font-weight: 600;
            border: 1px solid gold;
            cursor: pointer;
        }

        /* حدد النمط */
        .section-title {
            font-size: 1.2rem;
            font-weight: 700;
            color: #ffd966;
            margin-bottom: 15px;
            text-align: center;
        }
        .mode-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 12px;
            margin-bottom: 25px;
        }
        .mode-btn {
            background: rgba(0,0,0,0.4);
            border: 2px solid #ffd96655;
            border-radius: 30px;
            padding: 16px 8px;
            font-weight: 600;
            color: white;
            text-align: center;
            backdrop-filter: blur(5px);
            box-shadow: 0 5px 0 #0a0e17;
            cursor: pointer;
            transition: 0.1s ease;
            font-size: 1rem;
        }
        .mode-btn.active {
            background: rgba(255,215,0,0.2);
            border-color: gold;
            color: gold;
            box-shadow: 0 5px 0 #7f6600;
        }
        .mode-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 0 #0a0e17;
            border-color: gold;
        }

        /* أدوات سحرية */
        .magic-tools {
            background: rgba(0,0,0,0.3);
            border-radius: 40px;
            padding: 15px 20px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 20px;
            border: 1px solid #ffd96633;
        }
        .magic-tools span {
            font-size: 1.2rem;
            font-weight: 600;
        }
        .magic-tools .emoji {
            font-size: 2rem;
            background: rgba(255,215,0,0.2);
            width: 50px;
            height: 50px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            border: 1px solid gold;
        }

        /* الرهان */
        .bet-section {
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: rgba(0,0,0,0.3);
            border-radius: 60px;
            padding: 12px 25px;
            margin-bottom: 25px;
            border: 1px solid #ffd96633;
        }
        .bet-label {
            font-size: 1.2rem;
            font-weight: 600;
            color: #aaa;
        }
        .bet-value {
            font-size: 2rem;
            font-weight: 800;
            color: gold;
            text-shadow: 0 0 10px #ffaa00;
        }

        /* زر ابدأ */
        .start-btn {
            background: gold;
            color: black;
            border: none;
            width: 100%;
            padding: 18px;
            border-radius: 60px;
            font-size: 1.8rem;
            font-weight: 800;
            cursor: pointer;
            box-shadow: 0 10px 0 #b8860b, 0 10px 20px rgba(0,0,0,0.5);
            transition: 0.1s ease;
            margin-top: 10px;
        }
        .start-btn:active {
            transform: translateY(5px);
            box-shadow: 0 5px 0 #b8860b, 0 10px 20px rgba(0,0,0,0.5);
        }
    </style>
</head>
<body>
    <div class="app">
        <!-- رأس الصفحة -->
        <div class="header">
            <div class="back-btn" onclick="window.location.href='index.html'">
                <i class="fas fa-arrow-right"></i>
            </div>
            <div class="title">اختيار النمط</div>
            <div class="points-badge">
                <i class="fas fa-coins"></i>
                <span>1000+</span>
            </div>
        </div>

        <!-- عدد اللاعبين وخيار 1 مقابل 1 -->
        <div class="players-row">
            <div class="player-count">
                <i class="fas fa-users"></i>
                <span>4</span>
                <span style="color:#aaa; font-size:0.9rem;">لا يعبين</span>
            </div>
            <div class="vs-option" onclick="toggleVs(this)">
                1 مقابل 1
            </div>
        </div>

        <!-- حدد النمط -->
        <div class="section-title">حدد النمط</div>
        <div class="mode-grid">
            <div class="mode-btn active" onclick="selectMode(this)">السهم</div>
            <div class="mode-btn" onclick="selectMode(this)">الكلامسكي</div>
            <div class="mode-btn" onclick="selectMode(this)">الماستر</div>
            <div class="mode-btn" onclick="selectMode(this)">السريع</div>
        </div>

        <!-- أدوات سحرية -->
        <div class="magic-tools">
            <span>أدوات سحرية</span>
            <div class="emoji" onclick="toggleMagic(this)">
                <span>😊</span>
            </div>
        </div>

        <!-- الرهان -->
        <div class="bet-section">
            <span class="bet-label">الرهان</span>
            <span class="bet-value">500</span>
        </div>

        <!-- زر ابدأ -->
        <button class="start-btn" onclick="startGame()">ابدا</button>
    </div>

    <script>
        // تبديل حالة 1 مقابل 1
        function toggleVs(element) {
            element.classList.toggle('active');
            if (element.classList.contains('active')) {
                element.style.background = 'rgba(255,215,0,0.4)';
            } else {
                element.style.background = 'rgba(255,215,0,0.2)';
            }
        }

        // اختيار النمط
        function selectMode(selected) {
            const modes = document.querySelectorAll('.mode-btn');
            modes.forEach(m => m.classList.remove('active'));
            selected.classList.add('active');
        }

        // تبديل الأدوات السحرية
        function toggleMagic(emoji) {
            emoji.style.background = emoji.style.background === 'gold' ? 'rgba(255,215,0,0.2)' : 'gold';
        }

        // بدء اللعبة
        function startGame() {
            // هنا يمكن التوجيه إلى صفحة اللعبة الفعلية
            alert('سيتم بدء اللعبة قريباً!');
            // window.location.href = 'board.html';
        }
    </script>
</body>
</html>
