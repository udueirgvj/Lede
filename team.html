<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>اختيار النمط - Clipn</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        /* نفس التنسيقات السابقة */
        * { margin:0; padding:0; box-sizing:border-box; font-family:'Cairo', sans-serif; }
        body { background: linear-gradient(145deg, #0a0f1f, #141b2b); min-height:100vh; display:flex; align-items:center; justify-content:center; padding:16px; color:#fff; }
        .app { max-width:400px; width:100%; background:rgba(18,25,40,0.9); backdrop-filter:blur(12px); border-radius:48px; padding:30px 20px; box-shadow:0 25px 50px -8px rgba(0,0,0,0.6), 0 0 0 2px rgba(255,215,0,0.15) inset; border:1px solid rgba(255,215,0,0.3); }
        .header { display:flex; align-items:center; justify-content:space-between; margin-bottom:25px; }
        .back-btn { background:rgba(255,255,255,0.05); border:1px solid rgba(255,215,0,0.3); color:gold; width:44px; height:44px; border-radius:50%; display:flex; align-items:center; justify-content:center; font-size:1.4rem; cursor:pointer; }
        .title { font-size:1.6rem; font-weight:800; color:gold; }
        .points-badge { background:rgba(255,215,0,0.15); padding:8px 16px; border-radius:30px; display:flex; align-items:center; gap:8px; border:1px solid rgba(255,215,0,0.5); color:#ffd966; }
        .players-row { display:flex; align-items:center; justify-content:space-between; background:rgba(0,0,0,0.3); border-radius:60px; padding:10px 20px; margin-bottom:25px; border:1px solid #ffd96633; }
        .player-count { display:flex; align-items:center; gap:10px; font-size:1.2rem; }
        .vs-option { background:rgba(255,215,0,0.2); padding:8px 20px; border-radius:40px; color:gold; font-weight:600; border:1px solid gold; cursor:pointer; }
        .section-title { font-size:1.2rem; font-weight:700; color:#ffd966; margin-bottom:15px; text-align:center; }
        .mode-grid { display:grid; grid-template-columns:repeat(2,1fr); gap:12px; margin-bottom:25px; }
        .mode-btn { background:rgba(0,0,0,0.4); border:2px solid #ffd96655; border-radius:30px; padding:16px 8px; font-weight:600; color:white; text-align:center; cursor:pointer; transition:0.1s; }
        .mode-btn.active { background:rgba(255,215,0,0.2); border-color:gold; color:gold; }
        .magic-tools { background:rgba(0,0,0,0.3); border-radius:40px; padding:15px 20px; display:flex; align-items:center; justify-content:space-between; margin-bottom:20px; border:1px solid #ffd96633; }
        .magic-tools .emoji { font-size:2rem; background:rgba(255,215,0,0.2); width:50px; height:50px; border-radius:50%; display:flex; align-items:center; justify-content:center; cursor:pointer; }
        .bet-section { display:flex; align-items:center; justify-content:space-between; background:rgba(0,0,0,0.3); border-radius:60px; padding:12px 25px; margin-bottom:25px; border:1px solid #ffd96633; }
        .bet-value { font-size:2rem; font-weight:800; color:gold; }
        .start-btn { background:gold; color:black; border:none; width:100%; padding:18px; border-radius:60px; font-size:1.8rem; font-weight:800; cursor:pointer; box-shadow:0 10px 0 #b8860b; transition:0.1s; }
        .start-btn:active { transform:translateY(5px); box-shadow:0 5px 0 #b8860b; }
    </style>
</head>
<body>
    <div class="app">
        <div class="header">
            <div class="back-btn" onclick="history.back()"><i class="fas fa-arrow-right"></i></div>
            <div class="title">اختيار النمط</div>
            <div class="points-badge"><i class="fas fa-coins"></i><span>1000+</span></div>
        </div>
        <div class="players-row">
            <div class="player-count"><i class="fas fa-users"></i><span>4</span><span style="color:#aaa;">لاعبين</span></div>
            <div class="vs-option" onclick="toggleVs(this)">1 مقابل 1</div>
        </div>
        <div class="section-title">حدد النمط</div>
        <div class="mode-grid">
            <div class="mode-btn active" onclick="selectMode(this)" data-mode="السهم">السهم</div>
            <div class="mode-btn" onclick="selectMode(this)" data-mode="الكلامسكي">الكلامسكي</div>
            <div class="mode-btn" onclick="selectMode(this)" data-mode="الماستر">الماستر</div>
            <div class="mode-btn" onclick="selectMode(this)" data-mode="السريع">السريع</div>
        </div>
        <div class="magic-tools">
            <span>أدوات سحرية</span>
            <div class="emoji" onclick="toggleMagic(this)"><span>😊</span></div>
        </div>
        <div class="bet-section">
            <span class="bet-label">الرهان</span>
            <span class="bet-value" id="betValue">500</span>
        </div>
        <button class="start-btn" id="startBtn">ابدا</button>
    </div>

    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>
    <script src="firebase-config.js"></script>
    <script>
        // تحديد المتغيرات
        let selectedMode = 'السهم';
        let bet = 500; // يمكن زيادتها لاحقاً

        function selectMode(btn) {
            document.querySelectorAll('.mode-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            selectedMode = btn.dataset.mode;
        }
        function toggleVs(btn) {
            btn.classList.toggle('active');
            btn.style.background = btn.classList.contains('active') ? 'rgba(255,215,0,0.4)' : 'rgba(255,215,0,0.2)';
        }
        function toggleMagic(emoji) {
            emoji.style.background = emoji.style.background === 'gold' ? 'rgba(255,215,0,0.2)' : 'gold';
        }

        // عند الضغط على ابدأ
        document.getElementById('startBtn').addEventListener('click', async () => {
            const user = auth.currentUser;
            if (!user) {
                alert('يجب تسجيل الدخول أولاً');
                window.location.href = 'login.html';
                return;
            }

            // إنشاء طلب مطابقة في Firebase
            const matchRef = database.ref('matchmaking').push(); // نستخدم push لإنشاء طلب جديد
            const matchId = matchRef.key;
            const matchData = {
                userId: user.uid,
                mode: selectedMode,
                bet: bet,
                timestamp: firebase.database.ServerValue.TIMESTAMP,
                status: 'waiting'
            };
            await matchRef.set(matchData);

            // تنظيف الطلب إذا انقطع المستخدم
            matchRef.onDisconnect().remove();

            // الانتقال إلى صفحة المطابقة مع معرف الطلب
            window.location.href = `matching.html?matchId=${matchId}`;
        });
    </script>
</body>
</html>
